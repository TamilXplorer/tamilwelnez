<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Supabase client JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Merchant Dashboard | your Wellnez Admin</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: var(--bg-primary); margin: 0; min-height: 100vh;">

    <!-- Standalone Header Navbar -->
    <header class="main-header" style="position: sticky; top: 0; z-index: 100;">
        <div class="header-container" style="max-width: 100% !important; padding: 15px 4vw !important;">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                <img src="images/logo.png" alt="your Wellnez Logo" style="height: 52px; max-height: 52px; object-fit: contain; display: block;">
                <span style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800; text-transform: lowercase; letter-spacing: -0.03em; color: var(--text-main); line-height: 1;">your Wellnez</span>
            </a>
            <div style="font-family: var(--font-heading); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: #000000; padding: 5px 12px; border-radius: 2px; color: #FFFFFF;">
                Merchant Control Center
            </div>
            <a href="index.html" class="btn btn-outline" style="padding: 6px 15px; font-size: 0.75rem; border-color: var(--border-dark);"><i class="fa-solid fa-arrow-left"></i> Return to Store</a>
        </div>
    </header>

    <!-- Main Viewport Mount -->
    <main id="admin-viewport" style="min-height: calc(100vh - 80px); padding: 40px 0;"></main>

    <!-- Order Details Modal (Shared Modal) -->
    <div class="modal-overlay" id="order-details-modal">
        <div class="modal-content-card">
            <button class="modal-close-btn" id="order-modal-close">&times;</button>
            <div class="modal-title">Order Details</div>
            <div id="modal-order-content">
                <!-- Dynamic Content Load -->
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Admin Console Script -->
    <script src="js/admin.js"></script>
</body>
</html>
